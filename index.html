<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imam jedno pitanje za tebe... ELA ELA (ako se ljutiš na nadimak o’ma se sama blokiraj hahaha) 🤔</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            transition: all 0.3s ease;
        }

        h1 {
            color: #d63031;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        p {
            color: #4d4d4d;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        #yesBtn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #27ae60;
        }

        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            left: 55%;
        }
    </style>
</head>
<body>

    <div class="container" id="quizContainer">
        <h1 id="question"> ELA ELA (ako se ljutiš na nadimak o’ma se sama blokiraj hahaha) Hoćeš li bit’ moj bajramluk haha, tacnije bajramska kahvurina</h1>
        <p id="subtext">Samo je poželjno da ne budeš baš glam kao na slikama, bolje blam za oboje hahaha</p>
        
        <div class="buttons" id="btnGroup">
            <button class="btn" id="yesBtn">DA</button>
            <button class="btn" id="noBtn">NE</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const container = document.getElementById('quizContainer');
        const question = document.getElementById('question');
        const subtext = document.getElementById('subtext');
        const btnGroup = document.getElementById('btnGroup');

        function bjeziGumbu() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseenter', bjeziGumbu);
        
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            bjeziGumbu();
        });

        yesBtn.addEventListener('click', () => {
            question.innerHTML = "Ehh, ovom se nisam nad’o hahahah";
            subtext.innerHTML = "Ne moramo se žurit onda, vidimo se vcrs/sutra! 😉";
            btnGroup.style.display = 'none';
            document.body.style.background = "linear-gradient(135deg, #ff9999, #ff4d4d)";

            // Formspree slanje obavijesti
            fetch("https://formspree.io/f/xdajynbn", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Odgovor: "Ela je kliknula DA! ☕✨" })
            }).catch(err => console.log(err));
        });
    </script>
</body>
</html>
